name: forge parity gate

on:
  push:
    paths:
      - "forge-go/**"
      - "initial-docs/**"
      - ".github/workflows/forge-parity-gate.yml"
  pull_request:
    paths:
      - "forge-go/**"
      - "initial-docs/**"
      - ".github/workflows/forge-parity-gate.yml"

jobs:
  parity-unit-tests:
    if: ${{ vars.RUSTIC_AI_REPO != '' && vars.PYGO_PARITY_REPO != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rustic-go
        uses: actions/checkout@v4
        with:
          path: rustic-go

      - name: Checkout rustic-ai
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.RUSTIC_AI_REPO }}
          path: rustic-ai

      - name: Checkout pygo-parity
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PYGO_PARITY_REPO }}
          path: pygo-parity

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pygo-parity dependencies
        working-directory: pygo-parity
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run parity unit tests
        working-directory: pygo-parity
        run: make test

  parity-gate:
    if: ${{ vars.RUSTIC_AI_REPO != '' && vars.PYGO_PARITY_REPO != '' }}
    runs-on: ubuntu-latest
    needs: [parity-unit-tests]
    steps:
      - name: Checkout rustic-go
        uses: actions/checkout@v4
        with:
          path: rustic-go

      - name: Checkout rustic-ai
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.RUSTIC_AI_REPO }}
          path: rustic-ai

      - name: Checkout pygo-parity
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PYGO_PARITY_REPO }}
          path: pygo-parity

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pygo-parity dependencies
        working-directory: pygo-parity
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run parity gate and release-readiness checks
        working-directory: pygo-parity
        run: make ci-release-readiness

      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-artifacts
          path: pygo-parity/artifacts
