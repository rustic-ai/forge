name: forge-go CI

on:
  push:
    paths:
      - "forge-go/**"
      - ".github/workflows/forge-go-ci.yml"
  pull_request:
    paths:
      - "forge-go/**"
      - ".github/workflows/forge-go-ci.yml"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./forge-go
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: forge-go/go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: forge-go
          args: --timeout=5m

      - name: Unit tests (exclude e2e)
        run: |
          pkgs=$(go list ./... | grep -v '/e2e$')
          go test -v $pkgs

      - name: Build (linux native)
        run: go build -o bin/forge ./main.go

  native-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: ./forge-go

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: forge-go/go.mod
          cache: true

      - name: Build (native)
        run: go build -o bin/forge ./main.go

  cross-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: windows
            goarch: arm64
            suffix: ".exe"
    defaults:
      run:
        working-directory: ./forge-go
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: forge-go/go.mod
          cache: true

      - name: Cross compile
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -o dist/forge-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} ./main.go

      - name: Upload cross-build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.goos }}-${{ matrix.goarch }}
          path: forge-go/dist/forge-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
