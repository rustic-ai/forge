version: 2

project_name: forge

builds:
  - id: forge
    dir: .
    binary: forge
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X github.com/rustic-ai/forge/forge-go/version.Version={{.Version}}
      - -X github.com/rustic-ai/forge/forge-go/version.GitCommit={{.Commit}}
      - -X github.com/rustic-ai/forge/forge-go/version.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt
